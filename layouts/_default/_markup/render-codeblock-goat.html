{{ $width := .Attributes.width }}
{{ $height := .Attributes.height }}
{{ $class := .Attributes.class | default "diagram f5" }}
{{ $caption := or .Attributes.caption "" }}
{{ $id := or .Attributes.id (printf "diagram-%d" (add 1 .Ordinal)) }}

<figure class="goat" id="{{ $id }}">
  <div class="goat svg-container img-fluid {{ $class }}">
    {{ with diagrams.Goat .Inner }}
      <svg
        xmlns="http://www.w3.org/2000/svg"
        font-family="Menlo,Lucida Console,monospace"
        {{ if or $width $height }}
          {{ with $width }}width="{{ . }}"{{ end }}
          {{ with $height }}height="{{ . }}"{{ end }}
        {{ else }}
          viewBox="0 0 {{ .Width }} {{ .Height }}"
        {{ end }}>
        {{ .Inner }}
      </svg>
    {{ end }}
  </div>
  <figcaption class="figure-caption text-end">{{ $caption }}</figcaption>
</figure>
